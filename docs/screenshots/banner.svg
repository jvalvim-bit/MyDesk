<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MyDesk — Workspace de Notas Inteligente">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="55%" stop-color="#0d0d16"/>
      <stop offset="100%" stop-color="#12101f"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="95%" r="55%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="280" rx="24" fill="url(#dots)"/>
  <rect width="1200" height="280" rx="24" fill="url(#glow)"/>
  <rect width="1200" height="280" rx="24" fill="url(#glow2)"/>
  <rect x="1" y="1" width="1198" height="278" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="0" y="0" width="6" height="280" rx="3" fill="url(#stroke)"/>

  <!-- note-card mark -->
  <g transform="translate(78, 90)">
    <rect x="0" y="14" width="88" height="88" rx="18" fill="url(#cardGrad)" transform="rotate(-8 44 58)"/>
    <rect x="14" y="6" width="88" height="88" rx="18" fill="#12101f" stroke="#6366f1" stroke-opacity="0.5" stroke-width="1.5"/>
    <rect x="30" y="30" width="56" height="7" rx="3.5" fill="#a5b4fc"/>
    <rect x="30" y="46" width="40" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="30" y="62" width="48" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.15"/>
  </g>

  <text x="200" y="140" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#f5f5f7" letter-spacing="-1">MyDesk</text>
  <text x="200" y="178" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="21" font-weight="600" fill="#a5b4fc" letter-spacing="3">WORKSPACE INTELIGENTE</text>
  <text x="200" y="210" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="15.5" fill="#ffffff" fill-opacity="0.45">Notas, CRM e chat em tempo real — tudo em um único lugar.</text>
</svg>
